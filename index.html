<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinConnect - Upload Once. Get Multiple Loan Options.</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f7fb}
header{background:#0A66C2;color:#fff;padding:20px;text-align:center}
.container{max-width:900px;margin:20px auto;padding:15px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h2{margin-bottom:15px;color:#0A66C2}
input,select{width:100%;padding:12px;margin-top:8px;margin-bottom:15px;border:1px solid #ddd;border-radius:8px}
button{width:100%;padding:12px;background:#0A66C2;color:#fff;border:none;border-radius:8px;cursor:pointer}
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.status{background:#eef5ff;padding:10px;text-align:center;border-radius:8px}
footer{background:#222;color:#fff;text-align:center;padding:15px;margin-top:20px}
</style>
</head>
<body>
<header>
<h1>FinConnect</h1>
<p>Upload Once. Get Multiple Loan Options.</p>
</header>
<div class="container">
<div class="card">
<h2>Mobile OTP Login</h2>
<input type="text" placeholder="Enter Mobile Number">
<button>Send OTP</button><br><br>
<input type="text" placeholder="Enter OTP">
<button>Verify OTP</button>
</div>

<div class="card">
<h2>Profile Details</h2>
<input type="text" placeholder="Full Name">
<input type="date">
<input type="text" placeholder="City">
<select>
<option>Select Occupation</option>
<option>Salaried</option>
<option>Business</option>
<option>Student</option>
<option>Self Employed</option>
</select>
<input type="number" placeholder="Monthly Income">
</div>

<div class="card">
<h2>Loan Request</h2>
<select>
<option>Select Loan Type</option>
<option>Personal Loan</option>
<option>Business Loan</option>
<option>Home Loan</option>
<option>Gold Loan</option>
<option>Education Loan</option>
</select>
<input type="number" placeholder="Required Loan Amount">
</div>

<div class="card">
<h2>Consent</h2>
<label><input type="checkbox" id="agree"> I Agree</label><br><br>
<button onclick="submitApplication()">Submit Application</button>
</div>
</div>
<footer>© 2026 FinConnect</footer>
<script>
function submitApplication(){
if(!document.getElementById('agree').checked){
alert('Please accept consent before submitting.');
return;
}
alert('Application Submitted Successfully!');
}
</script>
</body>
</html>
